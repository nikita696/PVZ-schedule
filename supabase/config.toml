project_id = "pvz-schedule-main"

[auth]
site_url = "https://pvz-schedule.vercel.app"
additional_redirect_urls = [
  "http://127.0.0.1:4173/**",
  "http://localhost:4173/**",
  "http://127.0.0.1:5173/**",
  "http://localhost:5173/**",
  "https://pvz-schedule.vercel.app/**",
  "https://pvz-schedule-nick-rimers-projects.vercel.app/**",
  "https://*-nick-rimers-projects.vercel.app/**",
]

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600
