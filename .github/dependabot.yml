version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Moscow"
    target-branch: "main"
    open-pull-requests-limit: 3
    rebase-strategy: "disabled"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    groups:
      ui:
        patterns:
          - "@mui/*"
          - "@emotion/*"
          - "@radix-ui/*"
          - "lucide-react"
          - "recharts"
      supabase:
        patterns:
          - "@supabase/*"
      test-and-tooling:
        patterns:
          - "@testing-library/*"
          - "@types/*"
          - "@eslint/*"
          - "eslint"
          - "eslint-*"
          - "vite"
          - "vitest"
          - "jsdom"
          - "typescript"
          - "globals"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Europe/Moscow"
    target-branch: "main"
    open-pull-requests-limit: 2
    rebase-strategy: "disabled"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
