version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Moscow"
    target-branch: "main"
    open-pull-requests-limit: 1
    rebase-strategy: "disabled"
    commit-message:
      prefix: "chore(deps)"
    allow:
      - dependency-type: "direct:production"
    groups:
      production-non-major:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "07:30"
      timezone: "Europe/Moscow"
    target-branch: "main"
    open-pull-requests-limit: 0
    rebase-strategy: "disabled"
    commit-message:
      prefix: "chore(ci)"
