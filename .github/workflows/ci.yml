name: CI/CD\n\n-on: \n  push: {}\n  pull_request: {}\n\njobs: \n  build: \n    runs-on: ubuntu-latest\n\n    steps: \n      - name: Checkout code\n        uses: actions/checkout@v2\n\n      - name: Set up Node.js\n        uses: actions/setup-node@v2\n        with: \n          node-version: '14'\n\n      - name: Install dependencies\n        run: npm install\n\n      - name: TypeScript Type Checking\n        run: npm run tsc --noEmit\n\n      - name: ESLint Linting\n        run: npm run lint\n\n      - name: Run Vitest Unit Tests\n        run: npm run test\n\n      - name: Build Verification\n        run: npm run build\n