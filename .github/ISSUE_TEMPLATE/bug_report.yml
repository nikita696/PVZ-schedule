name: Bug report
description: Сообщить о баге или регрессии
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Что сломано
      description: Коротко опиши проблему
      placeholder: После сохранения выплаты сумма в сводке не обновляется
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Шаги для воспроизведения
      placeholder: |
        1. Открыть страницу ...
        2. Нажать ...
        3. Увидеть ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Окружение
      description: browser / device / env
      placeholder: Chrome 135, Android, production

  - type: textarea
    id: notes
    attributes:
      label: Дополнительно
      description: Скриншоты, логи, гипотезы
